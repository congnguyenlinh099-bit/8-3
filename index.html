<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>8/3 - Món quà nhỏ cho Ngân 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:system-ui,Segoe UI,sans-serif;
background:linear-gradient(135deg,#fff0f6,#ffe4f2,#ffd6ea);
min-height:100vh;
overflow-x:hidden;
color:#333
}

.intro{
position:fixed;
inset:0;
background:linear-gradient(to bottom,#111,#1b1b2f);
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:9999;
padding:20px
}

.intro h1{
font-family:'Playfair Display',serif;
font-size:clamp(2rem,8vw,3rem);
margin-bottom:30px
}

.open-btn{
padding:15px 40px;
font-size:1.2rem;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#ff6ec7,#ff2e9e);
color:white;
cursor:pointer;
box-shadow:0 10px 25px rgba(255,46,158,.4)
}

.container{
max-width:900px;
margin:40px auto;
background:rgba(255,255,255,.9);
padding:35px 25px;
border-radius:25px;
box-shadow:0 20px 60px rgba(255,105,180,.25);
backdrop-filter:blur(10px);
display:none;
animation:fadeIn 1.2s ease
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px)}
to{opacity:1;transform:translateY(0)}
}

h1{
text-align:center;
font-family:'Playfair Display',serif;
font-size:clamp(2.5rem,7vw,3.8rem);
color:#d63384
}

.subtitle{
text-align:center;
margin-top:10px;
font-style:italic;
color:#c2185b
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
margin:35px 0
}

.gallery img{
width:100%;
height:350px;
object-fit:cover;
border-radius:18px;
border:4px solid #ffe4f0;
box-shadow:0 8px 20px rgba(255,105,180,.25);
opacity:0;
transform:translateY(30px);
transition:.6s
}

.gallery img.loaded{
opacity:1;
transform:translateY(0)
}

.letter{
background:#fff8fb;
border:2px dashed #ff99cc;
border-radius:20px;
padding:30px;
line-height:1.8;
margin-top:20px;
font-size:1.1rem
}

.letter p{margin-bottom:14px}

.signature{
margin-top:25px;
text-align:right;
font-family:'Dancing Script',cursive;
font-size:2rem;
color:#c71585
}

.action-btn{
margin:35px auto;
display:block;
padding:16px 50px;
font-size:1.2rem;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#ff69b4,#ff1493);
color:white;
cursor:pointer;
box-shadow:0 10px 25px rgba(255,20,147,.4)
}

.hug-message{
display:none;
text-align:center;
font-size:1.6rem;
color:#d63384;
font-weight:bold;
animation:bounce 1.5s infinite
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

.secret{
margin-top:40px;
text-align:center;
display:none;
font-size:1.2rem;
color:#c2185b
}

.secret-btn{
margin-top:20px;
background:#ff4da6;
border:none;
padding:10px 25px;
color:white;
border-radius:30px;
cursor:pointer
}

.heart,.petal{
position:fixed;
pointer-events:none
}

.heart{
font-size:1.8rem;
animation:float 7s linear forwards
}

.petal{
width:16px;
height:26px;
background:linear-gradient(#ff69b4,#ff1493);
border-radius:60% 40% 70% 30%;
opacity:.8;
animation:fall 12s linear forwards
}

@keyframes float{
from{transform:translateY(0) scale(.5);opacity:.9}
to{transform:translateY(-120vh) scale(1.2);opacity:0}
}

@keyframes fall{
from{transform:translateY(-20vh) rotate(0)}
to{transform:translateY(140vh) rotate(1080deg)}
}
</style>
</head>
<body>

<div class="intro" id="intro">
<h1>Anh có một món quà nhỏ dành cho em hôm nay...</h1>
<button class="open-btn" onclick="openPage()">Mở ra nhé 🌹</button>
</div>

<div class="container" id="main">
<h1>Happy 8/3, Ngân của anh 🌸</h1>
<p class="subtitle">Một góc nhỏ anh làm chỉ để em cười một chút hôm nay</p>

<div class="gallery" id="gallery">
  <img src="photo_1.jpg" loading="lazy">
  <img src="photo_2.jpg" loading="lazy">
  <img src="photo_3.jpg" loading="lazy">
  <img src="photo_4.jpg" loading="lazy">
</div>

<div class="letter" id="letter"></div>

<button class="action-btn" onclick="surprise()">Nhấn đây để nhận cái ôm từ anh 🤗</button>
<div class="hug-message" id="hugMsg"></div>

<div style="text-align:center">
<button class="secret-btn" onclick="showSecret()">Bấm đây nếu em đang cười 😄</button>
</div>

<div class="secret" id="secretMsg">
Thấy em cười là anh yên tâm rồi 😄<br>
Vậy là món quà nhỏ này không uổng công anh làm cả buổi.
</div>
</div>

<script>
const letterText = `Bé nè,

Hôm nay là 8/3 nên anh muốn làm một cái gì đó hơi khác bình thường một chút.

Anh không biết món quà này có làm em bất ngờ không, nhưng anh chỉ hy vọng khi mở trang này ra em sẽ mỉm cười một chút.

Cảm ơn em vì những tin nhắn nhỏ nhỏ mỗi ngày, những lúc hỏi anh ăn chưa, và những câu chuyện rất bình thường nhưng lại làm ngày của anh dễ chịu hơn.

Chúc em hôm nay thật vui, thật nhiều năng lượng, và luôn giữ nụ cười đó nhé.

`;

let i=0;
function typeLetter(){
const el=document.getElementById('letter');
if(i<letterText.length){
el.innerHTML+=letterText.charAt(i)==='\n'?'<br>':letterText.charAt(i);
i++;
setTimeout(typeLetter,30);
}else{
el.innerHTML+="<div class='signature'>– Người gửi món quà nhỏ này</div>";
}
}

function openPage(){
document.getElementById('intro').style.display='none';
document.getElementById('main').style.display='block';
revealImages();
startEffects();
typeLetter();
}

function revealImages(){
const imgs=document.querySelectorAll('.gallery img');
imgs.forEach((img,i)=>{
setTimeout(()=>img.classList.add('loaded'),i*300);
});
}

function createHeart(){
const heart=document.createElement('div');
heart.className='heart';
heart.innerHTML=Math.random()>.5?'💖':'❤️';
heart.style.left=Math.random()*100+'vw';
heart.style.top=Math.random()*50+'vh';
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),7000);
}

function createPetal(){
const petal=document.createElement('div');
petal.className='petal';
petal.style.left=Math.random()*100+'vw';
petal.style.animationDuration=(Math.random()*6+10)+'s';
document.body.appendChild(petal);
setTimeout(()=>petal.remove(),15000);
}

function startEffects(){
setInterval(createPetal,400);
setInterval(createHeart,1800);
}

const messages=[
"Ôm một cái nè 🤗… trả lại anh một nụ cười là được rồi.",
"Cái ôm này miễn phí… nhưng phải cười mới được nhận nha 😄",
"Ôm xong rồi đó… hôm nay nhớ vui thật nhiều nha.",
"Nếu anh ở gần chắc anh ôm em thật rồi đó 😌"
];

function surprise(){
const msg=messages[Math.floor(Math.random()*messages.length)];
const el=document.getElementById('hugMsg');
el.innerText=msg;
el.style.display='block';

for(let i=0;i<35;i++){
setTimeout(createHeart,i*70);
}
}

function showSecret(){
document.getElementById('secretMsg').style.display='block';
}
</script>

</body>
</html>
